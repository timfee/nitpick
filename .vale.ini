; Prose linting for comments, Markdown, and UI microcopy.
; Run via `npm run lint:prose` — it feeds Vale directly for Markdown and
; code comments, and masks Angular templates and string-literal copy
; (Vale's HTML parser cannot handle @if/@for control flow) down to their
; user-visible text first.
;
; Styles are vendored by scripts/vendor-vale-styles.mjs (pinned versions,
; no network or `vale sync` needed): proselint, write-good, ai-tells,
; ai-tells-commits, and Openly, plus the project's own Nitpick rules.
StylesPath = .vale/styles
MinAlertLevel = suggestion

Vocab = Nitpick

[*]
BasedOnStyles = Vale, proselint, write-good, ai-tells, Openly, Nitpick
Vale.Spelling = NO
Openly.Spelling = NO
; The vocabulary is a spelling allow-list only; Vale.Terms would also
; enforce casing, which misfires on hostnames like apis.google.com.
Vale.Terms = NO
; Document-level Flesch scores stay informational: technical docs full of
; API names never reach 70 without losing precision.
Openly.Readability = suggestion
; "Very easy to read" and friends are the canonical Flesch verdict labels,
; so intensifier flags need a human call.
proselint.Very = suggestion
write-good.Weasel = suggestion

; Masked Angular template and string-literal text from scripts/lint-prose.mjs.
[*.txt]
Nitpick.Headings = NO
; Masking puts tooltip and aria-label values next to identical visible
; text, which reads as repetition to Vale but is correct UI code.
Vale.Repetition = NO
write-good.Illusions = NO

; Masked string literals sit side by side with only whitespace between
; them, so sentence-level metrics would measure across unrelated strings.
; Tricolon detection also spans literals, and the model-facing instruction
; strings it keeps hitting are parallel lists by design.
[*.strings.txt]
Openly.SentenceLength = NO
ai-tells.VerbTricolon = NO
