name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; later pushes wait rather than cancel, so the newest
# commit always deploys last.
concurrency:
  group: deploy

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Identity created by scripts/setup-deploy.sh; repository variables
    # override these defaults when the GCP side is recreated elsewhere.
    env:
      WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/204060019607/locations/global/workloadIdentityPools/github/providers/github' }}
      DEPLOY_SA: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT || 'github-deploy@nitpick-6an5rp.iam.gserviceaccount.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read resource set
        id: env
        run: |
          read_env() {
            node --input-type=module -e "
              const { environment } = await import('./src/environments/environment.ts');
              console.log(environment['$1'] ?? '');
            "
          }
          {
            echo "service=$(read_env service)"
            echo "project=$(read_env project)"
            echo "region=$(read_env region)"
            echo "client_id=$(read_env googleClientId)"
          } >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ steps.env.outputs.service }}" \
            --source . \
            --project "${{ steps.env.outputs.project }}" \
            --region "${{ steps.env.outputs.region }}" \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ steps.env.outputs.project }},GOOGLE_CLIENT_ID=${{ steps.env.outputs.client_id }}" \
            --quiet
