---
extends: existence
message: "AI commit tell: unquantified claim '%s'. Back it with numbers. 'X faster' is meaningless without a baseline. The kernel guide is explicit: quantify optimizations."
level: warning
raw:
  - '(?i)(?:'
  - '\b(?:significantly|substantially|notably|considerably|dramatically|vastly|greatly|massively|markedly)\s+(?:faster|slower|better|reduced|reduces|reducing|improved|improves|improving|increased|increases|increasing|decreased|decreases|decreasing|optimized|enhanced)\b'
  - '|\bmuch\s+(?:faster|slower|better|smaller|larger|cleaner)\b'
  - '|\b(?:huge|massive|major)\s+(?:performance|speed|memory|latency)\s+(?:improvement|boost|gain|reduction|increase|win)\b'
  - '|\bblazing(?:ly)?\s+fast\b'
  - '|\bnoticeably\s+(?:faster|slower|better)\b'
  - ')'
