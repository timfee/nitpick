---
extends: existence
message: "AI commit tell: '%s'. Strip agent marketing trailers. If disclosure is needed, use a kernel-style 'Assisted-by: AGENT:VERSION' trailer instead (see Documentation/process/coding-assistants.rst in the Linux kernel)."
level: error
# Scope `raw` so markdown autolink parsing doesn't hide <noreply@anthropic.com>
# inside a link node before the rule scans.
scope: raw
# Vale concatenates raw entries without a separator, so wrap the
# alternation in a single non-capturing group.
raw:
  - '(?:'
  - '🤖\s*Generated with'
  - '|(?i)Generated with \[Claude Code\]'
  - '|(?i)Generated with Claude Code'
  - '|(?i)Co-Authored-By:\s*Claude(?:\s+\w+)?\b'
  - '|noreply@anthropic\.com'
  - '|(?i)Co-Authored-By:\s*GitHub Copilot'
  - '|(?i)Co-Authored-By:\s*Cursor\b'
  - '|(?i)Generated with GitHub Copilot'
  - '|(?i)Generated by Cursor'
  - ')'
