tokens:
  # "No X. No Y. No Z." pattern (3+ consecutive)
  - "No [^.]+\\. No [^.]+\\. No [^.]+"

  # "No X. No Y." pattern (2 consecutive)
  - "No \\w[^.]+\\. No \\w[^.]+"

  # "No X, no Y, no Z." pattern (3+ comma-separated)
  - "No [^,]+, no [^,]+, no [^.!?]+"

  # "No X, no Y." pattern (2 comma-separated)
