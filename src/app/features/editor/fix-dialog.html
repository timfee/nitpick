<h2 mat-dialog-title>Fix issues with AI</h2>

<mat-dialog-content>
  <div class="meta">
    <span>Line {{ paragraph() }} of {{ groupCount }}</span>
    @if (approved()) {
      <span>{{ approved() }} accepted</span>
    }
  </div>
  <mat-progress-bar [value]="progress()" aria-label="Fix progress" />

  @if (step(); as s) {
    <div class="issues" role="region" aria-label="Issues on this line">
      <table>
        <thead>
          <tr>
            <th class="c-dot"></th>
            <th class="c-text">Text</th>
            <th class="c-issue">Issue</th>
            <th class="c-fix">Replacement</th>
          </tr>
        </thead>
        <tbody>
          @for (f of s.findings; track f.id) {
            <tr [class]="'severity-' + f.severity" [title]="f.severity">
              <td class="c-dot"><span class="dot" aria-hidden="true"></span></td>
              <td class="c-text">{{ f.quote }}</td>
              <td class="c-issue">{{ f.message }}</td>
              <td class="c-fix">{{ f.suggestion || '—' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="panes">
      <nit-diff-pane heading="This line" change="del" [segments]="originalDiff()" />
      <nit-diff-pane
        heading="Suggested fix"
        change="ins"
        [segments]="suggestedDiff()"
        [loading]="loading()"
        [error]="error()"
      />
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton (click)="skip()">Skip</button>
  <button matButton="outlined" [disabled]="loading()" (click)="retry()">Retry</button>
  <button matButton="filled" [disabled]="loading() || !suggestion()" (click)="accept()">
    Accept
  </button>
</mat-dialog-actions>
