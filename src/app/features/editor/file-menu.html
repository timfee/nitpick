<button matButton class="trigger" [matMenuTriggerFor]="menu">
  Open &amp; save
  <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
</button>
<mat-menu #menu>
  <button mat-menu-item (click)="triggerImport()">
    <mat-icon>upload_file</mat-icon>
    Import markdown file
  </button>
  <button mat-menu-item (click)="download()">
    <mat-icon>download</mat-icon>
    Download as markdown
  </button>
  @if (driveEnabled()) {
    <mat-divider />
    <button mat-menu-item [disabled]="driveBusy()" (click)="openFromDrive()">
      <mat-icon>add_to_drive</mat-icon>
      Open from Google Drive
    </button>
    <button mat-menu-item [disabled]="driveBusy()" (click)="saveToDrive()">
      <mat-icon>cloud_upload</mat-icon>
      Save to Google Drive
    </button>
  }
</mat-menu>
<input
  #fileInput
  type="file"
  accept=".md,.markdown,text/markdown"
  hidden
  (change)="onFileSelected($event)"
/>
