<p class="msg">{{ finding().message }}</p>
@if (finding().suggestion) {
  <nit-suggestion-chip>{{ finding().suggestion }}</nit-suggestion-chip>
}
<div class="actions">
  @if (finding().suggestion) {
    <button matButton="tonal" (click)="swap.emit()">Swap</button>
  }
  @if (siblings() > 1 || !finding().suggestion) {
    <button matButton (click)="fixLine.emit()">
      @if (siblings() > 1) {
        Fix all {{ siblings() }} issues with AI
      } @else {
        Fix with AI
      }
    </button>
  }
  <button matButton (click)="ignore.emit()">Ignore</button>
</div>
