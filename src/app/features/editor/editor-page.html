<mat-toolbar>
  <span class="brand">
    <mat-icon>spellcheck</mat-icon>
    Nitpicker
  </span>

  @if (editor(); as ed) {
    <nit-editor-toolbar [editor]="ed" />
  }

  <span class="spacer"></span>

  <button
    matButton="filled"
    class="check"
    matTooltip="Ctrl/⌘ + Enter"
    [disabled]="checking() || !editor()"
    (click)="check()"
  >
    @if (checking()) {
      <mat-spinner diameter="18" />
    } @else {
      <mat-icon>rate_review</mat-icon>
    }
    Check prose
  </button>

  <button matIconButton matTooltip="Settings" aria-label="Settings" (click)="openSettings()">
    <mat-icon>tune</mat-icon>
  </button>

  <nit-account-menu />
</mat-toolbar>

<div class="body">
  <main #main>
    @if (editor(); as ed) {
      <tiptap-editor [editor]="ed" />
    } @else {
      <mat-spinner diameter="32" style="place-self: center" />
    }
    @if (popover(); as p) {
      <nit-lint-popover
        [finding]="p.finding"
        [siblings]="p.siblings"
        [style.left.px]="p.x"
        [style.top.px]="p.y"
        (swap)="apply(p.finding)"
        (fixLine)="fixLine(p.finding)"
        (ignore)="dismiss(p.finding)"
      />
    }
  </main>

  <nit-findings-panel
    [findings]="findings()"
    [selectedId]="selectedId()"
    [stale]="stale()"
    (selectFinding)="select($event)"
    (applyFinding)="apply($event)"
    (dismissFinding)="dismiss($event)"
    (fixAll)="fixAll()"
  />
</div>

<nit-status-bar [words]="words()" [readability]="readability()" />
