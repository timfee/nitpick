<mat-toolbar class="topbar">
  <span class="brand">
    <mat-icon>spellcheck</mat-icon>
    Nitpick
  </span>

  @if (editor(); as ed) {
    <span class="fmt">
      <button
        matIconButton
        matTooltip="Undo"
        [disabled]="!canUndo()"
        (click)="ed.chain().focus().undo().run()"
      >
        <mat-icon>undo</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Redo"
        [disabled]="!canRedo()"
        (click)="ed.chain().focus().redo().run()"
      >
        <mat-icon>redo</mat-icon>
      </button>
      <span class="sep"></span>
      <button
        matIconButton
        matTooltip="Bold"
        [class.on]="isActive('bold')"
        (click)="ed.chain().focus().toggleBold().run()"
      >
        <mat-icon>format_bold</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Italic"
        [class.on]="isActive('italic')"
        (click)="ed.chain().focus().toggleItalic().run()"
      >
        <mat-icon>format_italic</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Strikethrough"
        [class.on]="isActive('strike')"
        (click)="ed.chain().focus().toggleStrike().run()"
      >
        <mat-icon>strikethrough_s</mat-icon>
      </button>
      <span class="sep"></span>
      <button
        matIconButton
        matTooltip="Heading"
        [class.on]="isActive('heading', { level: 2 })"
        (click)="ed.chain().focus().toggleHeading({ level: 2 }).run()"
      >
        <mat-icon>format_h2</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Bullet list"
        [class.on]="isActive('bulletList')"
        (click)="ed.chain().focus().toggleBulletList().run()"
      >
        <mat-icon>format_list_bulleted</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Numbered list"
        [class.on]="isActive('orderedList')"
        (click)="ed.chain().focus().toggleOrderedList().run()"
      >
        <mat-icon>format_list_numbered</mat-icon>
      </button>
      <button
        matIconButton
        matTooltip="Quote"
        [class.on]="isActive('blockquote')"
        (click)="ed.chain().focus().toggleBlockquote().run()"
      >
        <mat-icon>format_quote</mat-icon>
      </button>
    </span>
  }

  <span class="spacer"></span>
  <span class="words">{{ words() }} words</span>

  <button
    matButton="filled"
    class="check"
    [disabled]="checking() || !editor()"
    (click)="check()"
    matTooltip="Ctrl/⌘ + Enter"
  >
    @if (checking()) {
      <mat-spinner class="btn-spinner" diameter="18" />
    } @else {
      <mat-icon>rate_review</mat-icon>
    }
    Check prose
  </button>

  <button matIconButton class="account" [matMenuTriggerFor]="accountMenu">
    @if (user()?.picture; as picture) {
      <img class="avatar" [src]="picture" alt="Account" referrerpolicy="no-referrer" />
    } @else {
      <mat-icon>account_circle</mat-icon>
    }
  </button>
  <mat-menu #accountMenu>
    <div class="menu-user">
      <strong>{{ user()?.name }}</strong>
      <small>{{ user()?.email }}</small>
    </div>
    <button mat-menu-item (click)="signOut()">
      <mat-icon>logout</mat-icon>
      Sign out
    </button>
  </mat-menu>
</mat-toolbar>

<div class="body">
  <main class="paper">
    @if (editor(); as ed) {
      <tiptap-editor [editor]="ed" />
    } @else {
      <div class="loading">
        <mat-spinner diameter="32" />
      </div>
    }
  </main>

  <nit-findings-panel
    class="panel"
    [findings]="findings()"
    [selectedId]="selectedId()"
    [stale]="stale()"
    (selectFinding)="select($event)"
    (applyFinding)="apply($event)"
    (dismissFinding)="dismiss($event)"
  />
</div>
