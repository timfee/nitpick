<mat-toolbar>
  <span class="brand mat-title-large">
    <mat-icon>spellcheck</mat-icon>
    Nitpicker
  </span>

  @if (editor()) {
    @for (tool of tools; track tool.icon) {
      <button
        matIconButton
        [matTooltip]="tool.tip"
        [attr.aria-label]="tool.tip"
        [class.active]="isOn(tool)"
        [disabled]="isDisabled(tool)"
        (click)="run(tool)"
      >
        <mat-icon>{{ tool.icon }}</mat-icon>
      </button>
    }
  }

  <span class="spacer"></span>
  <span class="words mat-label-medium">{{ words() }} words</span>

  <button
    matButton="filled"
    matTooltip="Ctrl/⌘ + Enter"
    [disabled]="checking() || !editor()"
    (click)="check()"
  >
    @if (checking()) {
      <mat-spinner diameter="18" />
    } @else {
      <mat-icon>rate_review</mat-icon>
    }
    Check prose
  </button>

  <button matIconButton class="account" aria-label="Account" [matMenuTriggerFor]="accountMenu">
    @if (user()?.picture; as picture) {
      <img class="avatar" [src]="picture" alt="" referrerpolicy="no-referrer" />
    } @else {
      <mat-icon>account_circle</mat-icon>
    }
  </button>
  <mat-menu #accountMenu>
    <div class="menu-user">
      <strong>{{ user()?.name }}</strong>
      <small>{{ user()?.email }}</small>
    </div>
    <button mat-menu-item (click)="signOut()">
      <mat-icon>logout</mat-icon>
      Sign out
    </button>
  </mat-menu>
</mat-toolbar>

<div class="body">
  <main>
    @if (editor(); as ed) {
      <tiptap-editor [editor]="ed" />
    } @else {
      <mat-spinner diameter="32" style="place-self: center" />
    }
  </main>

  <nit-findings-panel
    [findings]="findings()"
    [selectedId]="selectedId()"
    [stale]="stale()"
    (selectFinding)="select($event)"
    (applyFinding)="apply($event)"
    (dismissFinding)="dismiss($event)"
  />
</div>
