<mat-toolbar>
  <span class="brand">
    <mat-icon>spellcheck</mat-icon>
    Nitpicker
  </span>

  @if (editor(); as ed) {
    <nit-editor-toolbar [editor]="ed" />
  }

  <span class="spacer"></span>

  <button
    matButton="filled"
    class="check"
    matTooltip="Ctrl/⌘ + Enter"
    [disabled]="checking() || !editor()"
    (click)="check()"
  >
    @if (checking()) {
      <mat-spinner diameter="18" />
    } @else {
      <mat-icon>rate_review</mat-icon>
    }
    Check prose
  </button>

  <button matIconButton matTooltip="Settings" aria-label="Settings" (click)="openSettings()">
    <mat-icon>tune</mat-icon>
  </button>

  <nit-account-menu />
</mat-toolbar>

<div class="body">
  <main>
    @if (editor(); as ed) {
      <tiptap-editor [editor]="ed" />
    } @else {
      <mat-spinner diameter="32" style="place-self: center" />
    }
  </main>

  <nit-findings-panel
    [findings]="findings()"
    [selectedId]="selectedId()"
    [stale]="stale()"
    (selectFinding)="select($event)"
    (applyFinding)="apply($event)"
    (dismissFinding)="dismiss($event)"
    (fixAll)="fixAll()"
  />
</div>

<footer class="statusbar">
  <span>{{ words() }} words</span>
  @if (readability(); as r) {
    <span class="sep" aria-hidden="true"></span>
    <span class="optional">{{ r.sentences }} sentences</span>
    <span class="sep optional" aria-hidden="true"></span>
    <span>Reading ease {{ r.ease.value }} · {{ r.ease.verdict }}</span>
    <span class="sep optional" aria-hidden="true"></span>
    <span class="optional">{{ r.grades[0].label }} grade {{ r.grades[0].value }}</span>
  }
  <span class="spacer"></span>
  <button type="button" class="all-scores" (click)="openSettings()">All scores</button>
</footer>
