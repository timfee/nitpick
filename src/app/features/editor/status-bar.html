<footer class="statusbar">
  <span class="stat"><b>{{ words() }}</b> words</span>
  @if (readability(); as r) {
    <mat-divider vertical class="optional" />
    <span class="stat optional"><b>{{ r.sentences }}</b> sentences</span>
    <mat-divider vertical />
    <nit-metric-stat
      label="Ease"
      [value]="r.ease.value"
      [status]="r.ease.status"
      [describedBy]="card() ? 'readability-hovercard' : null"
      (show)="showEase($event, r)"
      (hide)="hideCard()"
    />
    @for (g of r.grades; track g.id) {
      <mat-divider vertical class="optional" />
      <nit-metric-stat
        class="optional"
        [label]="g.short"
        [value]="g.value"
        [status]="g.status"
        [describedBy]="card() ? 'readability-hovercard' : null"
        (show)="showGrade($event, g)"
        (hide)="hideCard()"
      />
    }
  }
</footer>

@if (card(); as c) {
  <div
    id="readability-hovercard"
    class="hovercard"
    role="tooltip"
    [style.left.px]="c.left"
    [style.bottom.px]="c.bottom"
  >
    <div class="head">
      <span class="label">{{ c.label }}</span>
      <span class="value" [class]="c.status">
        {{ c.value }}
      </span>
    </div>
    <p class="hint">{{ c.hint }}</p>
    <div class="scale">
      <div class="track">
        @for (z of c.zones; track z.from) {
          <div
            class="zone"
            [class]="z.status"
            [style.left.%]="z.from"
            [style.width.%]="z.to - z.from"
          ></div>
        }
        <div class="tick" [style.left.%]="c.limit"></div>
      </div>
      <div class="marker" [style.left.%]="c.marker"></div>
    </div>
    <div class="ends">
      <span>{{ c.endLeft }}</span>
      <span class="target" [style.left.%]="c.limit">{{ c.limitLabel }}</span>
      <span>{{ c.endRight }}</span>
    </div>
    <p class="aim">{{ c.aim }} · <span class="note">{{ c.note }}</span></p>
  </div>
}
