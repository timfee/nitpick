<footer class="statusbar">
  <span class="stat"><b>{{ words() }}</b> words</span>
  @if (readability(); as r) {
    <span class="sep optional" aria-hidden="true"></span>
    <span class="stat optional"><b>{{ r.sentences }}</b> sentences</span>
    <span class="sep" aria-hidden="true"></span>
    <span class="stat" [matTooltip]="easeTooltip(r)">
      Ease
      @if (r.ease.status === 'ok') {
        <b>{{ r.ease.value }}</b>
      } @else {
        <b class="badge" [class.severe]="r.ease.status === 'severe'">{{ r.ease.value }}</b>
      }
    </span>
    @for (g of r.grades; track g.id) {
      <span class="sep optional" aria-hidden="true"></span>
      <span class="stat optional" [matTooltip]="gradeTooltip(g)">
        {{ g.short }}
        @if (g.status === 'ok') {
          <b>{{ g.value }}</b>
        } @else {
          <b class="badge" [class.severe]="g.status === 'severe'">{{ g.value }}</b>
        }
      </span>
    }
  }
</footer>
