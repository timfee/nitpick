<h2 mat-dialog-title>Style packages</h2>

<mat-dialog-content>
  <div class="layout">
    <mat-nav-list aria-label="Style packages">
      @for (pkg of packages; track pkg.id) {
        <button
          mat-list-item
          type="button"
          [activated]="selected() === pkg.id"
          [class.off]="!settings.enabledRuleCount(pkg.id)"
          (click)="selected.set(pkg.id)"
        >
          <span matListItemTitle>{{ pkg.label }}</span>
          <span matListItemMeta class="count">
            @if (settings.enabledRuleCount(pkg.id); as n) {
              {{ n }}/{{ rulesFor(pkg.id).length }}
            } @else {
              Off
            }
          </span>
        </button>
      }
    </mat-nav-list>

    <section>
      @if (current(); as pkg) {
        <header>
          <div class="text">
            <span class="name">{{ pkg.label }}</span>
            <span class="summary">{{ pkg.summary }}</span>
          </div>
          <button matButton (click)="settings.setAllRules(pkg.id, true)">All</button>
          <button matButton (click)="settings.setAllRules(pkg.id, false)">None</button>
        </header>

        <ul class="rules" role="list">
          @for (rule of rulesFor(pkg.id); track rule.id) {
            <li>
              <mat-checkbox
                [checked]="settings.ruleEnabled(pkg.id, rule.id)"
                (change)="settings.setRule(pkg.id, rule.id, $event.checked)"
              >
                <span class="rule-name">{{ rule.id }}</span>
                @if (rule.hint) {
                  <span class="rule-hint">{{ rule.hint }}</span>
                }
              </mat-checkbox>
            </li>
          }
        </ul>
      }
    </section>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Done</button>
</mat-dialog-actions>
