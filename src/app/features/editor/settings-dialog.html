<h2 mat-dialog-title>Style packages</h2>

<mat-dialog-content>
  <div class="layout">
    <nav aria-label="Style packages">
      @for (pkg of packages; track pkg.id) {
        <button
          type="button"
          [class.active]="selected() === pkg.id"
          [class.off]="!settings.packageEnabled(pkg.id)"
          (click)="selected.set(pkg.id)"
        >
          <span class="name">{{ pkg.label }}</span>
          <span class="count">
            {{ settings.enabledRuleCount(pkg.id) }}/{{ rulesFor(pkg.id).length }}
          </span>
        </button>
      }
    </nav>

    <section>
      @if (current(); as pkg) {
        <header>
          <mat-slide-toggle
            [checked]="settings.packageEnabled(pkg.id)"
            (change)="settings.setPackage(pkg.id, $event.checked)"
            [aria-label]="'Check with ' + pkg.label"
          />
          <div class="text">
            <span class="name">{{ pkg.label }}</span>
            <span class="summary">{{ pkg.summary }}</span>
          </div>
          <span class="spacer"></span>
          <button type="button" class="link" (click)="settings.setAllRules(pkg.id, true)">
            All
          </button>
          <button type="button" class="link" (click)="settings.setAllRules(pkg.id, false)">
            None
          </button>
        </header>

        <ul class="rules" role="list">
          @for (rule of rulesFor(pkg.id); track rule.id) {
            <li>
              <mat-checkbox
                [checked]="settings.ruleEnabled(pkg.id, rule.id)"
                [disabled]="!settings.packageEnabled(pkg.id)"
                (change)="settings.setRule(pkg.id, rule.id, $event.checked)"
              >
                <span class="rule-name">{{ rule.id }}</span>
                @if (rule.hint) {
                  <span class="rule-hint">{{ rule.hint }}</span>
                }
              </mat-checkbox>
            </li>
          }
        </ul>
      }
    </section>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Done</button>
</mat-dialog-actions>
