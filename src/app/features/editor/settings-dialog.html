<h2 mat-dialog-title>Style packages</h2>

<mat-dialog-content>
  <div class="layout">
    <!-- Compact widths swap the rail for Material's single-select chip row. -->
    <div class="rail-chips">
      <mat-chip-listbox aria-label="Style packages" [value]="selected()" (change)="pick($event.value)">
        @for (pkg of packages; track pkg.id) {
          <mat-chip-option [value]="pkg.id" [class.off]="!settings.enabledRuleCount(pkg.id)">
            {{ pkg.label }}
          </mat-chip-option>
        }
      </mat-chip-listbox>
    </div>

    <mat-action-list aria-label="Style packages">
      @for (pkg of packages; track pkg.id) {
        <button
          mat-list-item
          type="button"
          [activated]="selected() === pkg.id"
          [class.off]="!settings.enabledRuleCount(pkg.id)"
          (click)="selected.set(pkg.id)"
        >
          <span matListItemTitle>{{ pkg.label }}</span>
          <span matListItemMeta class="count">
            @if (settings.enabledRuleCount(pkg.id); as n) {
              {{ n }}/{{ rulesFor(pkg.id).length }}
            } @else {
              Off
            }
          </span>
        </button>
      }
    </mat-action-list>

    <section>
      @if (current(); as pkg) {
        <header>
          <div class="text">
            <h3>{{ pkg.label }}</h3>
            <p class="summary">{{ pkg.summary }}</p>
          </div>
          <div class="bulk">
            <button matButton (click)="settings.setAllRules(pkg.id, true)">All</button>
            <button matButton (click)="settings.setAllRules(pkg.id, false)">None</button>
          </div>
        </header>

        <!--
          Material's own composition for a toggleable settings list: two-line
          list options with a leading checkbox. Alignment, row-sized targets,
          and list semantics come from the component, not hand-rolled grids.
        -->
        <mat-selection-list class="rules" (selectionChange)="onRuleToggle(pkg.id, $event)">
          @for (rule of rulesFor(pkg.id); track rule.id) {
            <mat-list-option
              togglePosition="before"
              [value]="rule.id"
              [selected]="settings.ruleEnabled(pkg.id, rule.id)"
            >
              <span matListItemTitle>{{ rule.id }}</span>
              @if (rule.hint) {
                <span matListItemLine [matTooltip]="rule.hint">{{ rule.hint }}</span>
              }
            </mat-list-option>
          }
        </mat-selection-list>
      }
    </section>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Done</button>
</mat-dialog-actions>
